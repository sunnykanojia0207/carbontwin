            - button "How does CarbonTwin know my carbon footprint is accurate?" [expanded] [ref=e877]:
              - generic [ref=e878]: How does CarbonTwin know my carbon footprint is accurate?
              - img [ref=e880]
            - paragraph [ref=e883]: Every kilogram of CO₂e is computed by a deterministic emission-factor lookup — never by the AI. We source factors from the EPA (US), DEFRA (UK), and IPCC (global), each tagged with its version and region. The AI only parses your input, writes narratives, and recommends levers. The math is auditable and the same for everyone in your region.
          - generic [ref=e885]:
            - button "What does the Invisible Carbon Detector actually do?" [ref=e886]:
              - generic [ref=e887]: What does the Invisible Carbon Detector actually do?
              - img [ref=e889]
            - paragraph [ref=e890]: You give it a photo (a receipt, a meal, a utility bill), a voice clip, or a sentence ("flew LHR→JFK economy, ate a burger"). The AI uses function calling to extract structured activities — category, amount, unit — with a confidence score. You see a review screen and confirm before anything is added to your log. The original image is discarded after parsing.
          - generic [ref=e892]:
            - button "Is my Climate Twin just a vanity avatar?" [ref=e893]:
              - generic [ref=e894]: Is my Climate Twin just a vanity avatar?
              - img [ref=e896]
            - paragraph [ref=e897]: No — it's a real model. Its shape is your composition across six categories (transport, food, home, shopping, digital, travel). Its tier and color shift as your footprint changes. Its persona text is AI-written from your actual stats. It exists to make a 7.4-tonne number legible and to give you something to nudge, not to gamify.
          - generic [ref=e899]:
            - button "How is the AI Negotiator different from a chatbot?" [ref=e900]:
              - generic [ref=e901]: How is the AI Negotiator different from a chatbot?
              - img [ref=e903]
            - paragraph [ref=e904]: "It has a job: converge on one concrete, realistic commitment in under three turns. It proposes a lever ranked by your impact-to-effort ratio, you accept or counter, and when you agree it creates a structured goal automatically. It never gives ultimatums, never moralizes, and always offers a range rather than a binary."
          - generic [ref=e906]:
            - button "Do I need to give up my lifestyle to use this?" [ref=e907]:
              - generic [ref=e908]: Do I need to give up my lifestyle to use this?
              - img [ref=e910]
            - paragraph [ref=e911]: No. The whole point of the simulator and negotiator is finding reductions that fit your life. Cut one flight, not all travel. Plant-based two days, not vegan forever. Partial commitments are first-class — sliders, not toggles. The product is designed for people who want to do something, not everything.
          - generic [ref=e913]:
            - button "What happens to my data? Can I delete it?" [ref=e914]:
              - generic [ref=e915]: What happens to my data? Can I delete it?
              - img [ref=e917]
            - paragraph [ref=e918]: Your data is yours. Export it as CSV or PDF anytime from Settings. Delete your account and everything cascades — full personal-data erasure in one transaction, no retention period. Images used for detection are processed and discarded; we don't store your photos. You can opt out of AI features entirely and the product still works (deterministically).
          - generic [ref=e920]:
            - button "Which AI model does it use, and can I trust it?" [ref=e921]:
              - generic [ref=e922]: Which AI model does it use, and can I trust it?
              - img [ref=e924]
            - paragraph [ref=e925]: We use Google Gemini for natural-language parsing, insights, and the negotiator. The specific model is disclosed on every AI surface, and every output is stamped with a prompt version for auditability. AI output that becomes data always passes through a Zod schema first; malformed output is retried once, then falls back to a deterministic default. The AI never decides your carbon math.
          - generic [ref=e927]:
            - button "Is it free?" [ref=e928]:
              - generic [ref=e929]: Is it free?
              - img [ref=e931]
            - paragraph [ref=e932]: A generous free tier covers personal use indefinitely — logging, your Climate Twin, the simulator, weekly insights, and a daily AI budget. Pro adds higher AI limits, advanced forecasting, and PDF reports. No card required to start, and the free tier is not a trial — it's a real product.
